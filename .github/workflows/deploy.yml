# ============================================================
# YourJannah — Auto-Deploy on Push to Main
#
# Deploys ALL plugins + theme to Cloudways via SSH/rsync.
# Any new plugin directory added to plugins/ is auto-deployed.
#
# Required GitHub Secrets (set in repo Settings > Secrets):
#   SSH_PRIVATE_KEY  — base64-encoded private key
#   SSH_HOST         — server host
#   SSH_USER         — SSH user
#   SSH_PORT         — SSH port (usually 22)
#   WP_PATH          — path to yourjannah WP installation
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'theme/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudways
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'SSH OK'"

      - name: Install Stripe SDK (yn-jannah)
        run: |
          cd plugins/yn-jannah
          cat > composer.json << 'COMPOSEREOF'
          {
            "name": "yourjannah/yn-jannah",
            "require": { "stripe/stripe-php": "^15.0" }
          }
          COMPOSEREOF
          composer install --no-dev --no-interaction --optimize-autoloader 2>/dev/null || true

      - name: Clean up removed plugins from server
        run: |
          # Get list of yn-jannah-* plugin dirs on server
          REMOTE_PLUGINS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "ls -d ${{ secrets.WP_PATH }}/wp-content/plugins/yn-jannah-*/ 2>/dev/null | xargs -I{} basename {}" || true)
          # Remove any that don't exist in repo
          for remote_plugin in $REMOTE_PLUGINS; do
            if [ ! -d "./plugins/$remote_plugin" ]; then
              echo "🗑️ Removing orphaned plugin: $remote_plugin"
              ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                "rm -rf ${{ secrets.WP_PATH }}/wp-content/plugins/$remote_plugin"
            fi
          done

      - name: Deploy ALL plugins
        run: |
          for plugin_dir in ./plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            [ ! -d "$plugin_dir" ] && continue
            echo "📦 Deploying plugin: $plugin_name"
            rsync -avz --delete \
              --exclude='.git' \
              --exclude='.DS_Store' \
              --exclude='node_modules' \
              --exclude='merge-mosques.js' \
              --exclude='*.zip' \
              -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
              "$plugin_dir" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WP_PATH }}/wp-content/plugins/$plugin_name/"
          done
          echo "✅ All plugins deployed"

      - name: Write deploy timestamp (cache buster)
        run: |
          echo "$(date +%s)" > ./theme/yourjannah-starter/.deploy-time

      - name: Deploy yourjannah-starter theme
        run: |
          echo "🎨 Deploying yourjannah-starter theme..."
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./theme/yourjannah-starter/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WP_PATH }}/wp-content/themes/yourjannah-starter/

      - name: Clear caches
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          cd ${{ secrets.WP_PATH }}
          wp cache flush 2>/dev/null || true
          wp transient delete --all 2>/dev/null || true
          wp breeze purge --all 2>/dev/null || true
          rm -rf wp-content/cache/* 2>/dev/null || true
          curl -s -X PURGE http://127.0.0.1:6081/ -H "X-Purge-Method: default" 2>/dev/null || true
          curl -s -X BAN http://127.0.0.1:6081/ -H "X-Ban-URL: .*" 2>/dev/null || true
          wp varnish purge 2>/dev/null || true
          echo "🧹 All caches cleared (WP + Varnish)"
          ENDSSH

      - name: Purge Cloudflare cache
        if: ${{ secrets.CF_ZONE_ID != '' && secrets.CF_API_TOKEN != '' }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            && echo "☁️ Cloudflare cache purged" \
            || echo "⚠️ Cloudflare purge failed (secrets may not be set)"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
