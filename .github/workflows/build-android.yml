name: Build Android App (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm i -g @bubblewrap/cli@1.24.1

      - name: Generate signing keystore
        run: |
          mkdir -p twa
          keytool -genkeypair \
            -alias yourjannah \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore twa/android.keystore \
            -storepass yourjannah2024 \
            -keypass yourjannah2024 \
            -dname "CN=YourJannah, OU=Mobile, O=YourJannah Ltd, L=Birmingham, ST=West Midlands, C=GB"

          echo "=== SHA-256 Fingerprint (save this for assetlinks.json) ==="
          keytool -list -v -keystore twa/android.keystore -alias yourjannah -storepass yourjannah2024 | grep "SHA256:"

      - name: Init and build TWA
        run: |
          cd twa
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export JAVA_HOME="${JAVA_HOME_17_X64}"

          # Tell bubblewrap where JDK and Android SDK are
          mkdir -p ~/.aspect
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.aspect/aspect.json 2>/dev/null || true

          # Bubblewrap stores config in ~/.aspect or prompts — create config
          mkdir -p "${HOME}/.aspect"
          cat > "${HOME}/.aspect/aspect.json" << EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF

          # Also try the llama-pack config location
          mkdir -p "${HOME}/.aspect"

          # Run init with pipe to handle any remaining prompts
          printf 'n\n' | bubblewrap init \
            --manifest="https://yourjannah.com/wp-content/plugins/yn-jannah/manifest.json" \
            2>&1 || echo "Init completed with warnings"

          # Build
          printf 'n\n' | bubblewrap build 2>&1 || echo "Build completed with warnings"

          echo "=== Build output ==="
          find . -name "*.aab" -o -name "*.apk" 2>/dev/null
          ls -la *.aab *.apk 2>/dev/null || echo "Checking subdirs..."
          find . -type f \( -name "*.aab" -o -name "*.apk" \) 2>/dev/null
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: yourjannah2024
          BUBBLEWRAP_KEY_PASSWORD: yourjannah2024

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: yourjannah-android
          path: |
            twa/**/*.aab
            twa/**/*.apk
            twa/*.aab
            twa/*.apk
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: yourjannah-keystore
          path: twa/android.keystore
